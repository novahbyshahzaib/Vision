function rHdr(){

function rTbs(){

}

function rSch(){
  const now=new Date();now.setHours(0,0,0,0);
  const pre=now<PS;
  const fr=new Date(pre?PS.getTime():now.getTime());
  const days=Array.from({length:7},(_,i)=>{const d=new Date(fr.getTime());d.setDate(fr.getDate()+i);return d;});
  const tk=dk(now);
  let h="";
  if(pre){const df=Math.ceil((PS.getTime()-now.getTime())/864e5);h+=`<div style="display:flex;align-items:center;gap:10px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:12px;padding:11px 14px;margin-bottom:14px">${IC.cl}<div><p style="margin:0;font-size:12px;font-weight:700;color:#1e40af">Schedule starts Monday, 15 June 2026</p><p style="margin:2px 0 0;font-size:11px;color:#3b82f6">${df} day(s) away</p></div></div>`;}
  days.forEach((day,di)=>{
    const d=dk(day),jd=day.getDay();
    const sp=SP[d];
    const sl=(sp&&sp.type==="test")?[]:WS[jd];
    const sun=jd===0,isT=d===tk&&!pre,isp=day<now&&!isT;
    const sts=sl.map((_,i)=>gst(d,i));
    const aD=sl.length>0&&sts.every(s=>s==="done");
    const aM=sts.some(s=>s==="missed");
    const aP=sl.length>0&&sts.every(s=>s==="pending");
    let sl2="";
    if(!pre&&di===0)sl2="TODAY";
    else if((!pre&&di===1)||(pre&&di===0))sl2="UPCOMING";
    const bc=isT?"#166534":aD?"#bbf7d0":aM?"#fecaca":"#e5e7eb";
    const hb=isT?"#f0fdf4":aD?"#f0fdf4":aM?"#fef2f2":"#f9fafb";
    if(sl2)h+=`<p style="margin:${di===0?"0 0 9px":"16px 0 9px"};font-size:10px;font-weight:800;color:#9ca3af;letter-spacing:1.2px;text-transform:uppercase">${sl2}</p>`;
    h+=`<div style="border:1.5px solid ${bc};border-radius:14px;overflow:hidden;margin-bottom:10px;opacity:${isp&&aP?.72:1}">`;
    h+=`<div style="padding:10px 14px;background:${hb};display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid ${bc}"><div style="display:flex;align-items:center;gap:7px"><span style="font-size:14px;font-weight:800;color:#111">${DS[jd]}, ${day.getDate()} ${MO[day.getMonth()]}</span>${isT?'<span style="font-size:9px;font-weight:800;letter-spacing:.5px;background:#166534;color:#fff;padding:2px 9px;border-radius:20px">TODAY</span>':""}${isp&&!aD?'<span style="font-size:9px;font-weight:700;background:#fee2e2;color:#dc2626;padding:2px 7px;border-radius:20px">OVERDUE</span>':""}</div>${aD?IC.ck:aM?IC.cr:""}</div>`;
    h+=`<div style="padding:10px 13px">`;
    if(sp&&sp.type==="test"){
      h+=`<div style="display:flex;align-items:center;gap:11px;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:11px 13px">${IC.ts}<div><p style="margin:0;font-size:13px;font-weight:700;color:#92400e">${es(sp.label)}</p><p style="margin:2px 0 0;font-size:11px;color:#a16207">${es(sp.sub)}</p></div></div>`;
    } else if(sun){
      h+=`<div style="display:flex;align-items:center;gap:11px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:11px 13px">${IC.bk}<div><p style="margin:0;font-size:13px;font-weight:600;color:#475569">Rest and Revision Day</p><p style="margin:2px 0 0;font-size:11px;color:#94a3b8">Vectors · Integration · Differentiation · Class 11 Revision</p></div></div>`;
    } else {
      sl.forEach((subj,idx)=>{
        const st=SS[subj],status=gst(d,idx),sc=SC[status],hn=!!gsn(d,idx);
        const si=status==="done"?IC.ck:status==="missed"?IC.cr:IC.pd;
        h+=`<div onclick="oMdl('${es(d)}',${idx},'${subj}')" style="display:flex;align-items:center;gap:10px;background:${sc.bg};border:1.5px solid ${sc.bd};border-radius:10px;padding:10px 12px;margin-bottom:${idx<sl.length-1?7:0}px;cursor:pointer;user-select:none"><div style="flex-shrink:0">${si}</div><div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:6px;margin-bottom:3px"><span style="font-size:10px;font-weight:700;padding:2px 9px;background:${st.ac};color:#fff;border-radius:20px">${st.lbl}</span><span style="font-size:10px;color:#9ca3af">Slot ${idx+1}</span>${hn?IC.nt:""}</div><p style="margin:0;font-size:12px;color:#374151;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${es(gcn(subj))}</p></div><span style="font-size:10px;font-weight:600;color:${sc.tx};flex-shrink:0">${sc.label}</span></div>`;
      });
    }
    h+=`</div></div>`;
  });
  return h;

function rCh(){
  const pills=AS.map(s=>{const c=(ST.D.currCh||{})[s]||0,t=CHT[s],a=ST.cs===s;return`<button onclick="sCS('${s}')" style="flex-shrink:0;padding:6px 11px;border-radius:20px;border:1.5px solid ${a?SS[s].ac:SS[s].bd};background:${a?SS[s].ac:"#fff"};color:${a?"#fff":SS[s].tx};font-size:10px;font-weight:700;cursor:pointer">${SS[s].lbl} ${c}/${t}</button>`;}).join("");
  let h=`<div style="display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px">${pills}</div>`;

    h+=`<div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:5px;margin-bottom:2px;flex-wrap:wrap">${iC?`<span style="font-size:9px;font-weight:800;background:${st.ac};color:#fff;padding:1px 7px;border-radius:20px">CURRENT</span>`:""}${iD?'<span style="font-size:9px;font-weight:700;background:#d1fae5;color:#065f46;padding:1px 7px;border-radius:20px">DONE</span>':""}${cd.note&&cd.note.trim()?IC.nt:""}${cd.todos&&cd.todos.length?`<span style="font-size:9px;color:#9ca3af">${cd.todos.length} task${cd.todos.length>1?"s":""}</span>`:""}</div>`;
    h+=`<p style="margin:0;font-size:12px;font-weight:${iC?700:500};color:#111;line-height:1.3">${es(nm)}</p></div>${isE?IC.cu:IC.cd}</div>`;
    if(isE){
      h+=`<div style="padding:0 13px 14px;background:${bg};border-top:1px solid ${st.bd}">`;
      if(!iC)h+=`<button onclick="sCrCh('${ST.cs}',${idx})" style="width:100%;margin:12px 0;padding:9px;background:${st.ac};color:#fff;border:none;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer">Set as Current Chapter</button>`;
      if(iC)h+=`<p style="margin:10px 0 12px;font-size:11px;color:${st.tx};font-weight:600">This is your current chapter — schedule updates automatically</p>`;
      h+=`<p style="margin:0 0 5px;font-size:10px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.7px">Notes</p>`;
      h+=`<textarea data-nk="${key}" oninput="oNI('${key}',this.value)" onblur="sChN('${key}')" placeholder="Add notes, formulas or reminders..." style="width:100%;min-height:72px;padding:9px;border:1px solid #e5e7eb;border-radius:8px;font-size:12px;color:#374151;line-height:1.5;resize:vertical;font-family:inherit;background:#fff;outline:none;box-sizing:border-box"></textarea>`;
      h+=`<p style="margin:13px 0 7px;font-size:10px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.7px">To-Do</p>`;
      (cd.todos||[]).forEach(t=>{
        h+=`<div style="display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid #f3f4f6"><div onclick="tgTd('${key}',${t.id})" style="cursor:pointer;flex-shrink:0">${t.d?IC.bon:IC.bof}</div><p style="margin:0;flex:1;font-size:12px;color:${t.d?"#9ca3af":"#374151"};text-decoration:${t.d?"line-through":"none"};line-height:1.4">${es(t.t)}</p><div onclick="dlTd('${key}',${t.id})" style="cursor:pointer;flex-shrink:0;padding:3px">${IC.tr}</div></div>`;
      });
      h+=`<div style="display:flex;gap:7px;margin-top:9px"><input data-tk="${key}" type="text" placeholder="Add a to-do and press Enter..." onkeydown="oTK(event,'${key}')" oninput="oTI('${key}',this.value)" style="flex:1;padding:8px 10px;border:1px solid #e5e7eb;border-radius:8px;font-size:12px;font-family:inherit;outline:none"/><button onclick="aTd('${key}')" style="padding:8px 12px;background:#f3f4f6;border:1px solid #e5e7eb;border-radius:8px;cursor:pointer;display:flex;align-items:center">${IC.pl}</button></div></div>`;
    }

function rPr(){

    const nlw=(ST.D.nlw||{})[s]??2;

    else if(net<=0){dateHtml=`<div style="background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:8px 10px"><p style="margin:0;font-size:11px;font-weight:700;color:#dc2626">Won't catch up at current pace</p><p style="margin:2px 0 0;font-size:10px;color:#9ca3af">New lectures (${nlw}/wk) ≥ catch-up slots (${cr}/wk). Increase daily slots or reduce new estimate.</p></div>`;}
    else{const pct=Math.min(100,Math.round((1-(bl/(INIT_BL[s]||bl+1)))*100));dateHtml=`<div style="background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:9px 11px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><div><p style="margin:0;font-size:10px;color:#9ca3af">Net progress</p><p style="margin:2px 0 0;font-size:13px;font-weight:800;color:#111">${net} lectures/week</p></div><div style="text-align:right"><p style="margin:0;font-size:10px;color:#9ca3af">Clears by</p><p style="margin:2px 0 0;font-size:13px;font-weight:800;color:${st.tx}">${fmtD(res.date)}</p></div></div><div style="height:6px;background:#e5e7eb;border-radius:3px;overflow:hidden"><div style="width:${pct}%;height:100%;background:${st.ac};border-radius:3px"></div></div><p style="margin:4px 0 0;font-size:10px;color:#9ca3af">${res.weeks} week${res.weeks>1?"s":""} remaining &middot; ${cr-nlw} net reduction/week</p></div>`;}

  });
  h+=`<div style="background:#fef3c7;border:1px solid #fde68a;border-radius:10px;padding:11px;font-size:11px;color:#92400e;line-height:1.7">Update "Lectures remaining" each week as you finish lectures. Update "New lectures/week" based on how many the live class uploads per week. The date adjusts automatically.</div></div>`;

}

  const now=new Date();now.setHours(0,0,0,0);
  const pre=now<PS;
  const fr=new Date(pre?PS.getTime():now.getTime());
  const days=Array.from({length:7},(_,i)=>{const d=new Date(fr.getTime());d.setDate(fr.getDate()+i);return d;});
  const tk=dk(now);
  let h=`<div style="background:linear-gradient(135deg,#1e3a5f,#1e40af);color:#fff;border-radius:14px;padding:14px;margin-bottom:14px"><p style="margin:0 0 4px;font-size:10px;opacity:.7;text-transform:uppercase;letter-spacing:.8px">Plan B — 70% PCM / 30% Bio</p><p style="margin:0 0 10px;font-size:14px;font-weight:800">Faster Chemistry & Physics catch-up</p><div style="display:flex;gap:5px">${[["PC",7],["Ph",6],["Zo",3],["Bo",2]].map(([s,n])=>`<div style="flex:1;background:rgba(255,255,255,.15);border-radius:8px;padding:6px 2px;text-align:center"><div style="font-size:14px;font-weight:800">${n}</div><div style="font-size:8px;opacity:.8">${s}/wk</div></div>`).join("")}</div></div>`;

  h+=`<div style="margin-bottom:14px"><p style="margin:0 0 8px;font-size:10px;font-weight:800;color:#9ca3af;letter-spacing:1.2px;text-transform:uppercase">Weekly Pattern</p><div style="display:grid;gap:5px">`;
  PBR.forEach(r=>{
    h+=`<div style="display:flex;align-items:center;gap:5px"><span style="font-size:10px;font-weight:700;color:#374151;width:28px;flex-shrink:0">${r.d}</span>`;
    if(r.sl){h+=r.sl.map(s=>`<div style="flex:1;background:${SS[s].ac};color:#fff;padding:5px 2px;border-radius:6px;text-align:center;font-size:9px;font-weight:700">${SS[s].lbl}</div>`).join("");}
    else{h+=`<div style="flex:1;background:#f3f4f6;border-radius:6px;padding:5px;text-align:center;font-size:9px;color:#9ca3af">Rest / Revision</div>`;}
    h+=`</div>`;
  });
  h+=`</div></div>`;
  h+=`<div style="background:#fef3c7;border:1px solid #fde68a;border-radius:10px;padding:10px 12px;margin-bottom:14px"><p style="margin:0 0 4px;font-size:11px;font-weight:700;color:#92400e">Catch-Up Dates (Plan B)</p><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px">${[["PC","~Aug 3","was Aug 24"],["Ph","~Aug 17","was Sep 14"],["Zo","~Oct 12","Bio slower"],["Bo","⚠ Watch","if PW adds 2+/wk"]].map(([s,date,note])=>`<div style="background:#fff;border:1px solid #fde68a;border-radius:7px;padding:7px 8px"><span style="font-size:9px;font-weight:700;padding:1px 6px;background:${SS[s].ac};color:#fff;border-radius:20px">${SS[s].lbl}</span><p style="margin:3px 0 0;font-size:12px;font-weight:800;color:#111">${date}</p><p style="margin:1px 0 0;font-size:9px;color:#9ca3af">${note}</p></div>`).join("")}</div></div>`;
  if(pre){const df=Math.ceil((PS.getTime()-now.getTime())/864e5);h+=`<div style="display:flex;align-items:center;gap:10px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:12px;padding:11px 14px;margin-bottom:14px">${IC.cl}<div><p style="margin:0;font-size:12px;font-weight:700;color:#1e40af">Schedule starts Monday, 15 June 2026</p><p style="margin:2px 0 0;font-size:11px;color:#3b82f6">${df} day(s) away</p></div></div>`;}
  days.forEach((day,di)=>{
    const d=dk(day),jd=day.getDay();
    const sp=SP[d];
    const sl=(sp&&sp.type==="test")?[]:WB[jd];
    const sun=jd===0,isT=d===tk&&!pre,isp=day<now&&!isT;
    const sts=sl.map((_,i)=>gstB(d,i));
    const aD=sl.length>0&&sts.every(s=>s==="done");

    let sl2="";

    else if((!pre&&di===1)||(pre&&di===0))sl2="UPCOMING";
    const bc=isT?"#166534":aD?"#bbf7d0":aM?"#fecaca":"#e5e7eb";
    const hb=isT?"#f0fdf4":aD?"#f0fdf4":aM?"#fef2f2":"#f9fafb";
    if(sl2)h+=`<p style="margin:${di===0?"0 0 9px":"16px 0 9px"};font-size:10px;font-weight:800;color:#9ca3af;letter-spacing:1.2px;text-transform:uppercase">${sl2}</p>`;
    h+=`<div style="border:1.5px solid ${bc};border-radius:14px;overflow:hidden;margin-bottom:10px;opacity:${isp&&aP?.72:1}">`;

    h+=`<div style="padding:10px 13px">`;
    if(sp&&sp.type==="test"){h+=`<div style="display:flex;align-items:center;gap:11px;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:11px 13px">${IC.ts}<div><p style="margin:0;font-size:13px;font-weight:700;color:#92400e">${es(sp.label)}</p><p style="margin:2px 0 0;font-size:11px;color:#a16207">${es(sp.sub)}</p></div></div>`;}

    else{sl.forEach((subj,idx)=>{const st=SS[subj],status=gstB(d,idx),sc=SC[status],hn=!!gsnB(d,idx);const si=status==="done"?IC.ck:status==="missed"?IC.cr:IC.pd;h+=`<div onclick="oMdl('${es(d)}',${idx},'${subj}',1)" style="display:flex;align-items:center;gap:10px;background:${sc.bg};border:1.5px solid ${sc.bd};border-radius:10px;padding:10px 12px;margin-bottom:${idx<sl.length-1?7:0}px;cursor:pointer;user-select:none"><div style="flex-shrink:0">${si}</div><div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:6px;margin-bottom:3px"><span style="font-size:10px;font-weight:700;padding:2px 9px;background:${st.ac};color:#fff;border-radius:20px">${st.lbl}</span><span style="font-size:10px;color:#9ca3af">Slot ${idx+1}</span>${hn?IC.nt:""}</div><p style="margin:0;font-size:12px;color:#374151;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${es(gcn(subj))}</p></div><span style="font-size:10px;font-weight:600;color:${sc.tx};flex-shrink:0">${sc.label}</span></div>`;});}
    h+=`</div></div>`;
  });
  return h;
}

function render(){
  const fn=[rSch,rPB,rCh,rPr,rDl];
  document.getElementById("app").innerHTML=rHdr()+rTbs()+`<div class="ct">${(fn[ST.tab]||rSch)()}</div>`+rMdl();
  document.querySelectorAll("[data-nk]").forEach(el=>{const k=el.dataset.nk;el.value=ST.cn[k] !== undefined?ST.cn[k]:(gcd(k).note||"");});
  document.querySelectorAll("[data-tk]").forEach(el=>{el.value=ST.ti[el.dataset.tk]||"";});
  const mn=document.getElementById("mn");if(mn)mn.value=ST.mn;
}

function setTab(i){ST.tab=i;render();}
function sCS(s){ST.cs=s;ST.ex=null;render();}
function oMdl(d,i,s,pb){ST.modal={dk:d,idx:i,subj:s,isPB:pb||0};ST.mn=pb?gsnB(d,i):gsn(d,i);render();}
function cMdl(){ST.modal=null;render();}
function sSt(d,i,s){if(ST.modal&&ST.modal.isPB){if(!ST.D.schedB)ST.D.schedB={};if(!ST.D.schedB[d])ST.D.schedB[d]=["pending","pending","pending"];ST.D.schedB[d][i]=s;}else{if(!ST.D.sched[d])ST.D.sched[d]=["pending","pending","pending"];ST.D.sched[d][i]=s;}sv();render();}
function sAC(){if(!ST.modal)return;const{dk:d,idx:i,isPB}=ST.modal;if(isPB){if(!ST.D.snB)ST.D.snB={};ST.D.snB[d+"-"+i]=ST.mn;}else{if(!ST.D.sn)ST.D.sn={};ST.D.sn[d+"-"+i]=ST.mn;}ST.modal=null;sv();render();}
function tCh(k){ST.ex=ST.ex===k?null:k;if(ST.ex&&ST.cn[k]===undefined)ST.cn[k]=gcd(k).note||"";render();}
function sCrCh(s,i){if(!ST.D.currCh)ST.D.currCh={};ST.D.currCh[s]=i;sv();render();}
function updBL(s,v){if(!ST.D.lbl)ST.D.lbl={...INIT_BL};ST.D.lbl[s]=Math.max(0,parseInt(v)||0);sv();render();}
function updNLW(s,v){if(!ST.D.nlw)ST.D.nlw={Ph:2,PC:2,Zo:1,Bo:1};ST.D.nlw[s]=Math.max(0,parseInt(v)||0);sv();render();}
function calcCatchUp(s){
  const bl=(ST.D.lbl||INIT_BL)[s]||0;
  const cr=CATCH_RATE[s]||3;
  const nr=(ST.D.nlw||{})[s]||0;
  const net=cr-nr;
  if(bl<=0)return{done:true};
  if(net<=0)return{done:false,net:net};
  const weeks=Math.ceil(bl/net);
  const now=new Date();now.setHours(0,0,0,0);
  const start=now<PS?new Date(PS.getTime()):now;
  const d=new Date(start.getTime());d.setDate(d.getDate()+weeks*7);
  return{done:false,net:net,weeks:weeks,date:d,bl:bl};
}
function oNI(k,v){ST.cn[k]=v;if(!ST.D.chData)ST.D.chData={};if(!ST.D.chData[k])ST.D.chData[k]={note:"",todos:[]};ST.D.chData[k].note=v;}
function sChN(k){sv();}
